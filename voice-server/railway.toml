[build]
builder = "DOCKERFILE"
dockerfilePath = "voice-server/Dockerfile"

# Railway needs the build context at the repo root so COPY can access src/ and package.json
watchPatterns = ["src/lib/voice/**", "voice-server/**", "package.json"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 5
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
